<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 480px; width: 100%; }
        h1 { color: #1d1d1f; font-size: 1.5rem; margin: 0 0 0.25rem 0; }
        p.subtitle { color: #86868b; font-size: 0.95rem; margin-bottom: 2rem; }
        
        /* Pill Styling */
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
        .pill { 
            padding: 10px 16px; border-radius: 20px; border: 1px solid #d2d2d7; 
            cursor: pointer; font-size: 0.85rem; transition: all 0.2s; user-select: none;
        }
        .pill.active { background-color: #34c759; border-color: #34c759; color: white; }
        
        .action-btn { width: 100%; background-color: #1d1d1f; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; }
        .step-panel { display: none; }
        .step-panel.active { display: block; }
        /* Add specific margin to fix your button spacing issue */
        #popBtn { margin-bottom: 2rem; width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="step1" class="step-panel active">
            <h1>Software Discovery Engine</h1>
            <p class="subtitle">Fill out form to get recommendations!</p>
            <button id="popBtn" onclick="runAutoPopulate()">Randomize Form</button>
            <form onsubmit="submitLeadForm(event)">
                <button type="submit" class="action-btn" id="submitBtn" disabled>Submit & Continue</button>
            </form>
        </div>

        <div id="step2" class="step-panel">
            <h1>Friction / Pain Points</h1>
            <p class="subtitle">Select multiple options below:</p>
            <div id="painPills" class="pill-container"></div>
            <button class="action-btn" onclick="submitPainPointsForm()">Finalize & View Results</button>
        </div>
    </div>

    <script>
        let currentRecord = null;
        let selectedPillIds = new Set();

        async function runAutoPopulate() {
            // Update button text logic
            const btn = document.getElementById('popBtn');
            btn.innerText = "Re-Randomize";
            
            const res = await fetch('/api/generate-identity');
            const data = await res.json();
            currentRecord = data;
            // ... fill inputs ...
        }

        async function submitLeadForm(event) {
            event.preventDefault();
            // ... capture fields ...
            const res = await fetch(`/api/pain-points?pillarId=${currentRecord.pillarId}`);
            const data = await res.json();
            
            const container = document.getElementById('painPills');
            container.innerHTML = data.painPoints.map(p => `
                <div class="pill" onclick="togglePill(this, ${p.id})">${p.label}</div>
            `).join('');
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function togglePill(el, id) {
            el.classList.toggle('active');
            if (selectedPillIds.has(id)) selectedPillIds.delete(id);
            else selectedPillIds.add(id);
        }

        async function submitPainPointsForm() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `<h1>Analyzing Matches...</h1>`; // + loader

            const res = await fetch('/api/submit-lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...currentRecord, painPointIds: Array.from(selectedPillIds) })
            });
            const result = await res.json();
            renderRecommendations(result.recommendations);
        }
        
        // ... (Keep renderRecommendations as defined before) ...
    </script>
</body>
</html>
