<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Engine - Intake Workflow</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 1rem;
        }
        .container {
            background: white; padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            max-width: 480px; width: 100%;
        }
        h1 { color: #1d1d1f; font-size: 1.5rem; margin: 0 0 0.25rem 0; }
        p.subtitle { color: #86868b; font-size: 0.95rem; margin-bottom: 2rem; }
        
        .action-zone { display: flex; justify-content: center; margin-bottom: 1.5rem; width: 100%; }
        button.trigger-btn {
            background-color: #0071e3; color: white; border: none;
            width: 100%; padding: 14px; font-size: 1rem; font-weight: 500;
            border-radius: 8px; cursor: pointer; transition: background 0.2s;
        }
        button.trigger-btn:hover { background-color: #0077ed; }
        
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #1d1d1f; margin-bottom: 0.5rem; }
        input, select {
            width: 100%; padding: 12px; font-size: 0.95rem;
            border: 1px solid #d2d2d7; border-radius: 8px; box-sizing: border-box;
        }
        .action-btn {
            width: 100%; background-color: #1d1d1f; color: white; border: none;
            padding: 14px; font-size: 1rem; font-weight: 500; border-radius: 8px;
            margin-top: 1rem; cursor: pointer;
        }
        .action-btn:disabled { cursor: not-allowed; opacity: 0.6; }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }

        /* Spinner Styles */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #0071e3;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="step1" class="step-panel active">
            <h1>Software Discovery Engine</h1>
            <p class="subtitle">Fill out form to get recommendations!</p>
            <button class="trigger-btn" id="popBtn" onclick="runAutoPopulate()">Auto-Populate</button>
            <form onsubmit="submitLeadForm(event)">
                <div class="form-group"><label>First Name</label><input type="text" id="firstName" required readonly></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="lastName" required readonly></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required readonly></div>
                <div class="form-group"><label>Company</label><input type="text" id="companyName" required readonly></div>
                <div class="form-group"><label>Size</label><select id="companySize" required><option value="Small">Small</option><option value="Medium">Medium</option><option value="Enterprise">Enterprise</option></select></div>
                <div class="form-group"><label>Industry</label><select id="industrySelect" required><option value="">-- Select --</option></select></div>
                <div class="form-group"><label>Department</label><select id="pillarSelect" required><option value="">-- Select --</option></select></div>
                <button type="submit" class="action-btn" id="submitBtn">Submit & Continue</button>
            </form>
        </div>

        <div id="step2" class="step-panel">
            <h1>Targeted Friction</h1>
            <p class="subtitle">Select your pain points:</p>
            <form id="painPointsForm" onsubmit="submitPainPointsForm(event)">
                <div id="painCheckboxes"></div>
                <button type="submit" class="action-btn" id="finalizeBtn">Finalize Lead Record</button>
            </form>
        </div>
    </div>

    <script>
        let currentRecord = null;

        // --- CORE SUBMISSION LOGIC WITH LOADER ---
        async function submitPainPointsForm(event) {
            event.preventDefault();
            const container = document.getElementById('mainContainer');
            const checkedBoxes = document.querySelectorAll('input[name="painPointIds"]:checked');
            const selectedPainIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));

            // Show Loading State
            container.innerHTML = `
                <h1>Analyzing Matches...</h1>
                <div class="loader"></div>
                <p style="text-align:center; color:#86868b;">Calculating the perfect software pyramid for your business.</p>
            `;

            try {
                const response = await fetch('/api/submit-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...currentRecord, painPointIds: selectedPainIds })
                });

                const result = await response.json();
                if (result.recommendations) {
                    renderRecommendations(result.recommendations);
                } else {
                    throw new Error("No recommendations returned.");
                }
            } catch (err) {
                alert('Error: ' + err.message);
                location.reload();
            }
        }

        // --- PYRAMID RENDERER ---
        function renderRecommendations(recommendations) {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `<h1>Your Recommended Stack</h1><div id="pyramidContainer" style="display:flex; flex-direction:column; gap:15px; align-items:center;"></div><button class="action-btn" onclick="location.reload()">Start Over</button>`;
            
            const pyramid = document.getElementById('pyramidContainer');
            recommendations.forEach((sol, index) => {
                const width = 100 - (index * 15);
                const card = document.createElement('div');
                card.style.cssText = `width:${width}%; background:#f5f5f7; padding:20px; border-radius:12px; text-align:center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);`;
                card.innerHTML = `<h3 style="margin:0;">${sol.solution_name}</h3><p style="font-size:0.8rem;">Score: ${sol.totalScore}</p>`;
                pyramid.appendChild(card);
            });
        }

        // ... (Keep your existing runSystemDiagnostics and other helper functions here) ...
    </script>
</body>
</html>
