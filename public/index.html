<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 480px; width: 100%; }
        h1 { color: #1d1d1f; font-size: 1.5rem; margin: 0 0 0.25rem 0; }
        p.subtitle { color: #86868b; font-size: 0.95rem; margin-bottom: 2rem; }
        
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #1d1d1f; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 12px; font-size: 0.95rem; border: 1px solid #d2d2d7; border-radius: 8px; box-sizing: border-box; }
        
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2rem; }
        .pill { padding: 10px 16px; border-radius: 20px; border: 1px solid #d2d2d7; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; user-select: none; }
        .pill.active { background-color: #34c759; border-color: #34c759; color: white; }
        
        .action-btn { width: 100%; background-color: #1d1d1f; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; margin-top: 1rem; }
        #popBtn { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 2rem; }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="step1" class="step-panel active">
            <h1>Software Discovery Engine</h1>
            <p class="subtitle">Fill out form to get recommendations!</p>
            <button id="popBtn" onclick="runAutoPopulate()">Randomize Form</button>
            <form onsubmit="submitLeadForm(event)">
                <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="lastName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Company</label><input type="text" id="companyName" required></div>
                <div class="form-group"><label>Size</label><select id="companySize" required><option value="Small">Small</option><option value="Medium">Medium</option><option value="Enterprise">Enterprise</option></select></div>
                <div class="form-group"><label>Industry</label><select id="industrySelect" required><option value="">-- Select Industry --</option></select></div>
                <div class="form-group"><label>Department</label><select id="pillarSelect" required><option value="">-- Select Department --</option></select></div>
                <button type="submit" class="action-btn" id="submitBtn">Submit & Continue</button>
            </form>
        </div>

        <div id="step2" class="step-panel">
            <h1>Company Initiatives or Pain Points</h1>
            <p class="subtitle">Select multiple options below:</p>
            <div id="painPills" class="pill-container"></div>
            <button class="action-btn" onclick="submitPainPointsForm()">Submit & View Recommendations</button>
        </div>
    </div>

    <script>
        let currentRecord = null;
        let selectedIntentionIds = new Set();

        window.onload = async () => {
            const [pRes, iRes] = await Promise.all([fetch('/api/pillars'), fetch('/api/industries')]);
            const pData = await pRes.json();
            const iData = await iRes.json();
            pData.pillars.forEach(p => document.getElementById('pillarSelect').innerHTML += `<option value="${p.id}">${p.name}</option>`);
            iData.industries.forEach(i => document.getElementById('industrySelect').innerHTML += `<option value="${i.id}">${i.name}</option>`);
        };

        async function runAutoPopulate() {
            document.getElementById('popBtn').innerText = "Randomize Again";
            const res = await fetch('/api/generate-identity');
            currentRecord = await res.json();
            document.getElementById('firstName').value = currentRecord.firstName;
            document.getElementById('lastName').value = currentRecord.lastName;
            document.getElementById('email').value = currentRecord.email;
            document.getElementById('companyName').value = currentRecord.companyName;
        }

        async function submitLeadForm(event) {
            event.preventDefault();
            currentRecord = { 
                ...currentRecord,
                companySize: document.getElementById('companySize').value,
                industryId: document.getElementById('industrySelect').value,
                pillarId: document.getElementById('pillarSelect').value
            };
            
            const res = await fetch(`/api/intentions?pillarId=${currentRecord.pillarId}`);
            const data = await res.json();
            document.getElementById('painPills').innerHTML = data.intentions.map(i => 
                `<div class="pill" onclick="togglePill(this, ${i.id})">${i.label}</div>`
            ).join('');
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function togglePill(el, id) {
            el.classList.toggle('active');
            selectedIntentionIds.has(id) ? selectedIntentionIds.delete(id) : selectedIntentionIds.add(id);
        }

        async function submitPainPointsForm() {
            document.getElementById('mainContainer').innerHTML = '<h1>Analyzing Matches...</h1>';
            const res = await fetch('/api/submit-lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...currentRecord, intentionIds: Array.from(selectedIntentionIds) })
            });
            const result = await res.json();
            
            const container = document.getElementById('mainContainer');
            container.innerHTML = `<h1>Your Recommended Stack</h1><div id="pyramidContainer" style="display:flex; flex-direction:column; gap:15px; align-items:center; width:100%;"></div>`;
            
            if (!result.recommendations || result.recommendations.length === 0) {
                document.getElementById('pyramidContainer').innerHTML = `<p style="color:#86868b;">No matching tools found for your configurations.</p>`;
                return;
            }

            result.recommendations.forEach((prod, i) => {
                const card = document.createElement('div');
                card.style.cssText = `width:${100-(i*12)}%; background:#white; border: 1px solid #d2d2d7; padding:20px; border-radius:12px; text-align:center; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);`;
                
                // Construct logo element cleanly if logo_url is stored in database record
                let logoImg = '';
                if (prod.logo_url) {
                    logoImg = `<img src="${prod.logo_url}" alt="${prod.product_name}" style="max-height: 45px; max-width: 140px; object-fit: contain; margin-bottom: 4px;" onerror="this.style.display='none'">`;
                }

                card.innerHTML = `
                    ${logoImg}
                    <h3 style="margin: 0; color: #1d1d1f; font-size: 1.15rem;">${prod.product_name}</h3>
                    <span style="font-size: 0.8rem; color: #86868b; font-weight: 500;">by ${prod.company_name}</span>
                    <span style="display: inline-block; background: #e8e8ed; color: #1d1d1f; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; margin-top: 4px;">Score: ${prod.total_score}</span>
                `;
                document.getElementById('pyramidContainer').appendChild(card);
            });
        }
    </script>
</body>
</html>
