<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Engine Preview</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f7;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #1d1d1f; margin-bottom: 0.5rem; }
        p { color: #86868b; margin-bottom: 1.5rem; }
        .result-box {
            background: #f5f5f7;
            padding: 1rem;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 1.5rem;
            font-family: monospace;
            min-height: 60px;
            word-break: break-all;
        }
        button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 980px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0077ed; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Discovery Engine</h1>
        <p>Generate a random enterprise identity</p>
        
        <div class="result-box" id="result">
            Click generate to fetch from your live API...
        </div>

        <button onclick="generateIdentity()">Generate Identity</button>
    </div>

    <script>
        async function generateIdentity() {
            const resultBox = document.getElementById('result');
            resultBox.innerHTML = 'Fetching from database...';
            
            try {
                const response = await fetch('/api/generate-identity');
                const data = await response.json();
                
                if (data.error) {
                    resultBox.innerHTML = `Error: ${data.error}`;
                } else {
                    resultBox.innerHTML = `
                        <strong>Name:</strong> ${data.firstName} ${data.lastName}<br>
                        <strong>Corporate Email:</strong> ${data.email}
                    `;
                }
            } catch (err) {
                resultBox.innerHTML = 'Failed to connect to API.';
            }
        }
    </script>
</body>
</html>
