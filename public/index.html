<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discovery Engine</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
        .container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); max-width: 600px; width: 100%; }
        h1 { color: #1d1d1f; font-size: 1.5rem; margin: 0 0 0.25rem 0; }
        h3 { margin: 0; }
        p.subtitle { color: #86868b; font-size: 0.95rem; margin-bottom: 2rem; }
        
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #1d1d1f; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 12px; font-size: 0.95rem; border: 1px solid #d2d2d7; border-radius: 8px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1); }
        
        .pill-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
        .pill { padding: 10px 16px; border-radius: 20px; border: 1px solid #d2d2d7; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; user-select: none; background: white; color: #1d1d1f; }
        .pill:hover { border-color: #0071e3; background-color: #f0f6ff; }
        .pill.active { background-color: #34c759; border-color: #34c759; color: white; }
        .pill.active:hover { background-color: #30b24f; }
        
        .pill-score { font-size: 0.7rem; opacity: 0.7; display: block; margin-top: 2px; }
        
        .action-btn { width: 100%; background-color: #1d1d1f; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; margin-top: 1rem; font-weight: 600; transition: background 0.2s; }
        .action-btn:hover { background-color: #424245; }
        #popBtn { width: 100%; padding: 12px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 2rem; font-weight: 600; transition: background 0.2s; }
        #popBtn:hover { background-color: #0066d6; }
        
        .step-panel { display: none; }
        .step-panel.active { display: block; }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="step1" class="step-panel active">
            <h1>Software Discovery Engine</h1>
            <p class="subtitle">Fill out form to get recommendations!</p>
            <button id="popBtn" onclick="runAutoPopulate()">Randomize Form</button>
            <form onsubmit="submitLeadForm(event)">
                <div class="form-group"><label>First Name</label><input type="text" id="firstName" required></div>
                <div class="form-group"><label>Last Name</label><input type="text" id="lastName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Company</label><input type="text" id="companyName" required></div>
                <div class="form-group"><label>Size</label><select id="companySize" required><option value="Small">Small</option><option value="Medium">Medium</option><option value="Enterprise">Enterprise</option></select></div>
                <div class="form-group"><label>Industry</label><select id="industrySelect" required><option value="">-- Select Industry --</option></select></div>
                <div class="form-group"><label>Department</label><select id="pillarSelect" required><option value="">-- Select Department --</option></select></div>
                <button type="submit" class="action-btn" id="submitBtn">Submit & Continue</button>
            </form>
        </div>

        <div id="step2" class="step-panel">
            <h1>Company Initiatives or Pain Points</h1>
            <p class="subtitle">Select initiatives that matter to you:</p>
            
            <div class="form-group">
                <input type="text" id="searchIntentions" placeholder="Search initiatives..." onkeyup="debounceSearch()">
            </div>
            
            <div id="topIntentionsSection">
                <h3 style="font-size: 0.95rem; color: #86868b; margin-bottom: 0.75rem; font-weight: 600;">Top Initiatives for Your Pillar & Industry</h3>
                <div id="topIntentionsPills" class="pill-container"></div>
            </div>
            
            <div id="searchResultsSection" style="display: none;">
                <h3 style="font-size: 0.95rem; color: #86868b; margin-bottom: 0.75rem; font-weight: 600;">Search Results</h3>
                <div id="searchResultsPills" class="pill-container"></div>
            </div>
            
            <div id="selectedSection" style="margin-top: 2rem; padding: 1rem; background: #f5f5f7; border-radius: 8px; display: none;">
                <h3 style="font-size: 0.95rem; color: #86868b; margin-bottom: 0.75rem; font-weight: 600;">Selected Initiatives</h3>
                <div id="selectedPills" class="pill-container"></div>
            </div>
            
            <button class="action-btn" onclick="submitPainPointsForm()" style="margin-top: 2rem;">Submit & View Recommendations</button>
        </div>
    </div>

    <script>
        let currentRecord = null;
        let selectedIntentionIds = new Set();
        let allIntentions = [];
        let topIntentions = [];
        let searchTimeout;

        window.onload = async () => {
            const [pRes, iRes] = await Promise.all([fetch('/api/pillars'), fetch('/api/industries')]);
            const pData = await pRes.json();
            const iData = await iRes.json();
            pData.pillars.forEach(p => document.getElementById('pillarSelect').innerHTML += `<option value="${p.id}">${p.name}</option>`);
            iData.industries.forEach(i => document.getElementById('industrySelect').innerHTML += `<option value="${i.id}">${i.name}</option>`);
        };

        async function runAutoPopulate() {
            document.getElementById('popBtn').innerText = "Randomize Again";
            const res = await fetch('/api/generate-identity');
            currentRecord = await res.json();
            document.getElementById('firstName').value = currentRecord.firstName;
            document.getElementById('lastName').value = currentRecord.lastName;
            document.getElementById('email').value = currentRecord.email;
            document.getElementById('companyName').value = currentRecord.companyName;
        }

        async function submitLeadForm(event) {
            event.preventDefault();
            currentRecord = { 
                ...currentRecord,
                companySize: document.getElementById('companySize').value,
                industryId: document.getElementById('industrySelect').value,
                pillarId: document.getElementById('pillarSelect').value
            };
            
            // Fetch top 4 intentions + all intentions with scores
            const res = await fetch(`/api/intentions-with-scores?pillarId=${currentRecord.pillarId}&industryId=${currentRecord.industryId}`);
            const data = await res.json();
            
            topIntentions = data.topIntentions;
            allIntentions = data.allIntentions;
            
            // Render top 4 intentions
            renderTopIntentions();
            
            // Clear search
            document.getElementById('searchIntentions').value = '';
            document.getElementById('searchResultsSection').style.display = 'none';
            document.getElementById('selectedSection').style.display = 'none';
            selectedIntentionIds.clear();
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function renderTopIntentions() {
            const html = topIntentions.map(i => 
                `<div class="pill" data-id="${i.id}" onclick="toggleIntention(this, ${i.id})">
                    ${i.label}
                    <span class="pill-score">Score: ${i.blendedScore.toFixed(1)}</span>
                </div>`
            ).join('');
            document.getElementById('topIntentionsPills').innerHTML = html;
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchIntentions').value.trim();
            
            if (!query) {
                document.getElementById('searchResultsSection').style.display = 'none';
                return;
            }
            
            searchTimeout = setTimeout(() => performSearch(query), 300);
        }

        function performSearch(query) {
            const queryLower = query.toLowerCase();
            const results = allIntentions.filter(i => 
                i.label.toLowerCase().includes(queryLower) &&
                !topIntentions.some(t => t.id === i.id)
            );
            
            if (results.length === 0) {
                document.getElementById('searchResultsSection').style.display = 'none';
                return;
            }
            
            const html = results.map(i => 
                `<div class="pill" data-id="${i.id}" onclick="toggleIntention(this, ${i.id})">
                    ${i.label}
                    <span class="pill-score">Score: ${i.blendedScore.toFixed(1)}</span>
                </div>`
            ).join('');
            
            document.getElementById('searchResultsPills').innerHTML = html;
            document.getElementById('searchResultsSection').style.display = 'block';
        }

        function toggleIntention(el, id) {
            el.classList.toggle('active');
            
            if (selectedIntentionIds.has(id)) {
                selectedIntentionIds.delete(id);
            } else {
                selectedIntentionIds.add(id);
            }
            
            updateSelectedDisplay();
        }

        function updateSelectedDisplay() {
            const selectedSection = document.getElementById('selectedSection');
            
            if (selectedIntentionIds.size === 0) {
                selectedSection.style.display = 'none';
                return;
            }
            
            selectedSection.style.display = 'block';
            
            const selectedIntentions = allIntentions.filter(i => selectedIntentionIds.has(i.id));
            const html = selectedIntentions.map(i => 
                `<div class="pill active" data-id="${i.id}" onclick="toggleIntention(this, ${i.id})">
                    ${i.label}
                    <span class="pill-score">Score: ${i.blendedScore.toFixed(1)}</span>
                </div>`
            ).join('');
            
            document.getElementById('selectedPills').innerHTML = html;
        }

        async function submitPainPointsForm() {
            if (selectedIntentionIds.size === 0) {
                alert('Please select at least one initiative.');
                return;
            }

            document.getElementById('mainContainer').innerHTML = '<h1>Analyzing Matches...</h1>';
            
            // Step 1: Submit lead with selected intentions
            const res = await fetch('/api/submit-lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...currentRecord, intentionIds: Array.from(selectedIntentionIds) })
            });
            const result = await res.json();

            // Step 2: Update engagement scores for selected intentions
            await fetch('/api/update-intention-scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ intentionIds: Array.from(selectedIntentionIds) })
            });
            
            const container = document.getElementById('mainContainer');
            container.innerHTML = `<h1>Your Recommended Stack</h1><div id="pyramidContainer" style="display:flex; flex-direction:column; gap:15px; align-items:center; width:100%;"></div>`;
            
            if (!result.recommendations || result.recommendations.length === 0) {
                document.getElementById('pyramidContainer').innerHTML = `<p style="color:#86868b;">No matching tools found for your configurations.</p>`;
                return;
            }

            result.recommendations.forEach((prod, i) => {
                const card = document.createElement('div');
                card.style.cssText = `width:${100-(i*12)}%; background:#white; border: 1px solid #d2d2d7; padding:20px; border-radius:12px; text-align:center; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);`;
                
                let logoImg = '';
                if (prod.logo_url) {
                    logoImg = `<img src="${prod.logo_url}" alt="${prod.product_name}" style="max-height: 45px; max-width: 140px; object-fit: contain; margin-bottom: 4px;" onerror="this.style.display='none'">`;
                }

                card.innerHTML = `
                    ${logoImg}
                    <h3 style="margin: 0; color: #1d1d1f; font-size: 1.15rem;">${prod.product_name}</h3>
                    <span style="font-size: 0.8rem; color: #86868b; font-weight: 500;">by ${prod.company_name}</span>
                    <span style="display: inline-block; background: #e8e8ed; color: #1d1d1f; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: 600; margin-top: 4px;">Score: ${prod.total_score}</span>
                `;
                document.getElementById('pyramidContainer').appendChild(card);
            });
        }
    </script>
</body>
</html>
